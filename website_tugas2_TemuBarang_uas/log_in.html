<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | TemuBarang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("bc_barbie_detective.png"); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; min-height: 100vh;}
        .glass-box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; position: relative !important; z-index: 9999 !important; pointer-events: auto !important; }
        .form-control-glass { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.5); color: white; border-radius: 10px; position: relative !important; z-index: 10000 !important; pointer-events: auto !important; }
        .form-control-glass:focus { background: rgba(255, 255, 255, 0.3); color: white; border-color: white; box-shadow: none; }
        .form-control-glass::placeholder { color: rgba(255, 255, 255, 0.8); }
        .form-label-custom { color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-weight: 500; font-size: 0.9rem; }
        .btn-custom { background-color: #e91e63; color: white; border: 2px solid white; transition: 0.3s; position: relative !important; z-index: 10000 !important; pointer-events: auto !important; }
        .btn-custom:hover { background-color: #c2185b; color: white; transform: scale(1.02); }
    </style>
</head>
<body class="d-flex flex-column position-relative">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute w-100 top-0 pt-3" style="z-index: 1050 !important; pointer-events: auto !important;">
        <div class="container">
            <a class="navbar-brand" style="font-family: 'Pacifico', cursive; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);" href="index.html">TemuBarang</a>
            <div class="d-flex">
                <a href="index.html" class="btn btn-outline-light rounded-pill px-3 py-1 fw-medium" style="backdrop-filter: blur(4px);">← Kembali</a>
            </div>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center flex-grow-1" style="padding-top: 80px;">
        <div class="glass-box p-4 p-md-5 shadow-lg col-11 col-sm-8 col-md-6 col-lg-4 text-center">
            <h2 class="mb-4 text-white fw-bold">Login ✨</h2>

            <form action="proses_login.php" method="POST" class="text-start">
                
                <div class="mb-3">
                    <label for="nim_nip" class="form-label form-label-custom">NIM / NIP:</label>
                    <input type="text" id="nim_nip" name="nim_nip" class="form-control form-control-glass py-2" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label form-label-custom">Password:</label>
                    <input type="password" id="password" name="password" class="form-control form-control-glass py-2" placeholder="Minimal 8 karakter" minlength="8" required>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-custom rounded-pill py-2 fw-bold shadow-sm">Masuk 🔎</button>
                </div>
            </form>

            <div class="text-white mt-4" style="font-size: 0.9rem; position: relative; z-index: 10000; pointer-events: auto;">
                <span>Belum punya akun?</span>
                <a href="daftar.html" class="text-white fw-bold" style="text-decoration: underline;">Daftar di sini</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
