<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Pendaftaran | TemuBarang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("bc_barbie_detective.png");
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0;
        }
        .glass-box { 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; 
            z-index: 9999 !important; position: relative !important; pointer-events: auto !important;
        }
        .btn-custom-1 { background-color: #e91e63; color: white; border: 2px solid white; transition: 0.3s; z-index: 10000 !important; position: relative !important; pointer-events: auto !important;}
        .btn-custom-1:hover { background-color: #c2185b; color: white; transform: scale(1.02); }
        .btn-custom-2 { background-color: #9c27b0; color: white; border: 2px solid white; transition: 0.3s; z-index: 10000 !important; position: relative !important; pointer-events: auto !important;}
        .btn-custom-2:hover { background-color: #7b1fa2; color: white; transform: scale(1.02); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 position-relative">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute w-100 top-0 pt-3" style="z-index: 1050 !important; pointer-events: auto !important;">
        <div class="container">
            <a class="navbar-brand" style="font-family: 'Pacifico', cursive; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);" href="index.html">TemuBarang</a>
            <div class="d-flex">
                <a href="log_in.html" class="btn btn-outline-light rounded-pill px-3 py-1 fw-medium" style="backdrop-filter: blur(4px);">← Kembali ke Login</a>
            </div>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center flex-grow-1" style="padding-top: 80px;">
        <div class="glass-box p-4 p-md-5 shadow-lg col-11 col-sm-8 col-md-6 col-lg-5 text-center">
            <h2 class="mb-3 text-white fw-bold">Daftar Akun ✨</h2>
            <p class="text-white mb-4 fw-medium" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Selamat datang, calon Detektif! <br>Pilih kategori identitas kamu:</p>

            <div class="d-grid gap-3 mb-4">
                <a href="daftar_mhs.html" class="btn btn-custom-1 rounded-pill py-3 fw-bold shadow-sm">Sebagai Mahasiswa 🎓</a>
                <a href="daftar_dosen_staff.html" class="btn btn-custom-2 rounded-pill py-3 fw-bold shadow-sm">Sebagai Dosen / Staf 💼</a>
            </div>

            <div class="text-white mt-4" style="font-size: 0.9rem; z-index: 10000; position: relative; pointer-events: auto;">
                <span>Sudah punya akun?</span>
                <a href="log_in.html" class="text-white fw-bold" style="text-decoration: underline;">Masuk di sini</a>
            </div>
        </div>
    </main>
</body>
</html>
