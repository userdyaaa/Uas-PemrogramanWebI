<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Dosen & Staf | TemuBarang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("bc_barbie_detective.png");
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0;
        }
        .glass-box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; z-index: 9999 !important; position: relative !important; pointer-events: auto !important; }
        .form-control-glass { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.5); color: white; border-radius: 10px; z-index: 10000 !important; position: relative !important; pointer-events: auto !important; }
        .form-control-glass:focus { background: rgba(255, 255, 255, 0.3); color: white; border-color: white; box-shadow: none; }
        .form-control-glass::placeholder { color: rgba(255, 255, 255, 0.8); }
        .form-label-custom { color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-weight: 500; font-size: 0.85rem; }
        .btn-custom { background-color: #9c27b0; color: white; border: 2px solid white; transition: 0.3s; z-index: 10000 !important; position: relative !important; pointer-events: auto !important; }
        .btn-custom:hover { background-color: #7b1fa2; color: white; transform: scale(1.02); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 position-relative">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute w-100 top-0 pt-3" style="z-index: 1050 !important; pointer-events: auto !important;">
        <div class="container">
            <a class="navbar-brand" style="font-family: 'Pacifico', cursive; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);" href="index.html">TemuBarang</a>
            <div class="d-flex">
                <a href="daftar.html" class="btn btn-outline-light rounded-pill px-3 py-1 fw-medium" style="backdrop-filter: blur(4px);">← Kembali</a>
            </div>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center flex-grow-1" style="padding-top: 80px; padding-bottom: 40px;">
        <div class="glass-box p-4 p-md-5 shadow-lg col-11 col-sm-8 col-md-6 col-lg-5 text-center">
            <h2 class="mb-4 text-white fw-bold">Dosen / Staf 💼</h2>

            <form action="proses_daftar.php" method="POST" class="text-start">
                <div class="mb-3">
                    <label class="form-label form-label-custom">Nama Lengkap:</label>
                    <input type="text" name="nama" class="form-control form-control-glass py-2" placeholder="Contoh: Dr. Nama, M.T." required>
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-custom">NIP:</label>
                    <input type="text" name="nip" class="form-control form-control-glass py-2" placeholder="Masukkan NIP" required>
                </div>
                <div class="mb-3">
                    <label class="form-label form-label-custom">Email Instansi:</label>
                    <input type="email" name="email" class="form-control form-control-glass py-2" placeholder="nama@ulm.ac.id" required>
                </div>
                <div class="mb-4">
                    <label class="form-label form-label-custom">Password:</label>
                    <input type="password" name="pass" class="form-control form-control-glass py-2" placeholder="Minimal 8 karakter" minlength="8" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-custom rounded-pill py-3 fw-bold shadow-sm">Daftar Akun Dosen / Staf ✨</button>
                </div>
            </form>
            
            <div class="text-white mt-4" style="font-size: 0.9rem; z-index: 10000; position: relative; pointer-events: auto;">
                <span>Sudah punya akun?</span> <a href="log_in.html" class="text-white fw-bold" style="text-decoration: underline;">Masuk di sini</a>
            </div>
        </div>
    </main>
</body>
</html>
